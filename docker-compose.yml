version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ecosphere_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/ecosphere
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: change-me-in-production
      PORT: 8000
    ports:
      - "8000:8000"

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"

volumes:
  ecosphere_mongo_data:
